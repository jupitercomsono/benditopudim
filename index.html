<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Bendito Pudim — Lançar Venda</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Work+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap');

  :root{
    --cream:#FBF3E7;
    --cream-2:#F3E7D3;
    --cocoa:#5A3A22;
    --cocoa-deep:#3E2814;
    --caramel:#C8893F;
    --caramel-deep:#7B4B2A;
    --frost:#4F8B99;
    --frost-deep:#2E5A66;
    --frost-pale:#E4F1F3;
    --caramel-pale:#F7E9D2;
    --good:#4C7A52;
    --good-bg:#E4EEE1;
    --bad:#B5482F;
    --bad-bg:#F7E3DD;
    --line: rgba(90,58,34,0.14);
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background: var(--cream);
    font-family:'Work Sans', sans-serif;
    color: var(--cocoa-deep);
    min-height:100vh;
    -webkit-tap-highlight-color: transparent;
  }
  .wrap{
    max-width: 480px;
    margin: 0 auto;
    padding: 0 0 48px;
    min-height:100vh;
    background: var(--cream);
  }

  /* ---- Header / thermometer signature ---- */
  header{
    background: linear-gradient(180deg, var(--cocoa-deep), var(--cocoa) 85%);
    color: var(--cream);
    padding: 22px 20px 26px;
    border-radius: 0 0 28px 28px;
    position: relative;
    overflow: hidden;
  }
  header::after{
    content:"";
    position:absolute; right:-40px; top:-40px;
    width:140px; height:140px; border-radius:50%;
    background: radial-gradient(circle, rgba(200,137,63,0.35), transparent 70%);
  }
  .brand{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size: 22px;
    letter-spacing: 0.2px;
    display:flex; align-items:center; gap:8px;
  }
  .brand .dot{ font-size:20px; }
  .subtitle{
    font-size: 12.5px;
    opacity: 0.72;
    margin-top: 2px;
    font-weight:500;
  }

  .goal-row{
    margin-top: 18px;
    display:flex;
    gap: 10px;
  }
  .goal-card{
    flex:1;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: 14px;
    padding: 10px 12px;
  }
  .goal-label{
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    opacity: 0.65;
    font-weight:600;
  }
  .goal-value{
    font-family:'IBM Plex Mono', monospace;
    font-size: 15px;
    font-weight:600;
    margin-top:3px;
    cursor: pointer;
  }
  .therm{
    margin-top: 8px;
    height: 7px;
    border-radius: 6px;
    background: rgba(255,255,255,0.15);
    overflow:hidden;
  }
  .therm-fill{
    height:100%;
    background: linear-gradient(90deg, var(--caramel), #E8B36B);
    border-radius: 6px;
    transition: width 0.5s ease;
  }

  /* ---- Body ---- */
  main{ padding: 20px 20px 0; }

  .segmented{
    display:flex;
    background: var(--cream-2);
    border-radius: 14px;
    padding: 4px;
    gap: 4px;
  }
  .seg-btn{
    flex:1;
    border:none;
    background:transparent;
    padding: 12px 8px;
    border-radius: 10px;
    font-family:'Work Sans', sans-serif;
    font-weight:600;
    font-size: 14.5px;
    color: var(--cocoa);
    cursor:pointer;
    transition: all 0.18s ease;
  }
  .seg-btn.active[data-p="geladinho"]{
    background: var(--frost);
    color: white;
    box-shadow: 0 3px 10px rgba(79,139,153,0.35);
  }
  .seg-btn.active[data-p="pudim"]{
    background: var(--caramel-deep);
    color: white;
    box-shadow: 0 3px 10px rgba(123,75,42,0.35);
  }
  .seg-btn.active[data-p="bolo"]{
    background: #8C5E2A;
    color: white;
    box-shadow: 0 3px 10px rgba(140,94,42,0.35);
  }

  .tamanhos{
    display:flex; flex-wrap:wrap; gap:8px;
  }
  .tamanho-chip{
    border: 1.5px solid var(--line);
    background: var(--cream);
    border-radius: 10px;
    padding: 9px 14px;
    font-family:'IBM Plex Mono', monospace;
    font-weight:600;
    font-size: 14px;
    color: var(--cocoa);
    cursor:pointer;
  }
  .tamanho-chip.active{
    background: var(--caramel-deep);
    border-color: var(--caramel-deep);
    color: white;
  }

  .card{
    background: white;
    border-radius: 18px;
    padding: 18px;
    margin-top: 16px;
    border: 1px solid var(--line);
  }

  .field{ margin-bottom: 16px; }
  .field label{
    display:block;
    font-size: 12px;
    font-weight:600;
    color: var(--cocoa);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-bottom: 6px;
  }
  .field input[type="text"]{
    width:100%;
    border: 1.5px solid var(--line);
    background: var(--cream);
    border-radius: 12px;
    padding: 12px 14px;
    font-size: 16px;
    font-family:'Work Sans', sans-serif;
    color: var(--cocoa-deep);
  }
  .field input[type="text"]:focus{
    outline: none;
    border-color: var(--caramel);
  }

  .row2{ display:flex; gap:12px; }
  .row2 .field{ flex:1; }

  .stepper{
    display:flex;
    align-items:center;
    border: 1.5px solid var(--line);
    background: var(--cream);
    border-radius: 12px;
    overflow:hidden;
  }
  .stepper button{
    width: 44px; height: 46px;
    border:none;
    background: var(--cream-2);
    font-size: 20px;
    font-weight:700;
    color: var(--cocoa-deep);
    cursor:pointer;
  }
  .stepper input{
    flex:1;
    border:none;
    background:transparent;
    text-align:center;
    font-family:'IBM Plex Mono', monospace;
    font-size: 17px;
    font-weight:600;
    color: var(--cocoa-deep);
    -moz-appearance: textfield;
  }
  .stepper input::-webkit-outer-spin-button,
  .stepper input::-webkit-inner-spin-button{ -webkit-appearance:none; margin:0; }

  .price-input{
    display:flex; align-items:center;
    border: 1.5px solid var(--line);
    background: var(--cream);
    border-radius: 12px;
    padding: 0 12px;
  }
  .price-input span{ font-family:'IBM Plex Mono', monospace; font-weight:600; color:var(--cocoa); font-size:15px;}
  .price-input input{
    border:none; background:transparent; padding: 12px 6px;
    font-family:'IBM Plex Mono', monospace; font-size:16px; font-weight:600;
    color: var(--cocoa-deep); width:100%;
  }
  .price-input input:focus{ outline:none; }
  #descontoBox{
    justify-content:center;
    background: var(--cream-2);
  }
  #descontoValor{
    font-size: 16px;
    font-weight:700;
  }
  #descontoValor.tem-desconto{ color: var(--good); }

  .toggle-pago{
    display:flex; gap:8px;
  }
  .toggle-pago button{
    flex:1;
    border: 1.5px solid var(--line);
    background: var(--cream);
    border-radius: 12px;
    padding: 11px;
    font-weight:600;
    font-size: 14px;
    color: var(--cocoa);
    cursor:pointer;
  }
  .toggle-pago button.active[data-v="sim"]{
    background: var(--good-bg); border-color: var(--good); color: var(--good);
  }
  .toggle-pago button.active[data-v="nao"]{
    background: var(--bad-bg); border-color: var(--bad); color: var(--bad);
  }

  .total-strip{
    display:flex; justify-content:space-between; align-items:baseline;
    padding: 14px 4px 4px;
    border-top: 1px dashed var(--line);
    margin-top: 4px;
  }
  .total-strip .lbl{ font-size:13px; font-weight:600; color:var(--cocoa); }
  .breakdown{
    font-family:'IBM Plex Mono', monospace;
    font-size: 13px;
    color: var(--cocoa);
    opacity: 0.7;
    margin-top: 2px;
  }
  .total-strip .val{
    font-family:'Fraunces', serif;
    font-size: 26px;
    font-weight:600;
    color: var(--cocoa-deep);
  }

  .submit-btn{
    width:100%;
    margin-top: 16px;
    border:none;
    background: var(--caramel-deep);
    color: white;
    padding: 16px;
    border-radius: 14px;
    font-family:'Work Sans', sans-serif;
    font-size: 16px;
    font-weight:700;
    letter-spacing: 0.02em;
    cursor:pointer;
    transition: transform 0.12s ease;
  }
  .submit-btn:active{ transform: scale(0.98); }
  .submit-btn:disabled{ opacity:0.5; }

  .toast{
    position: fixed;
    bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--cocoa-deep);
    color: var(--cream);
    padding: 12px 20px;
    border-radius: 12px;
    font-size: 14px;
    font-weight:600;
    opacity:0;
    pointer-events:none;
    transition: all 0.25s ease;
    z-index: 50;
    white-space:nowrap;
  }
  .toast.show{ opacity:1; transform: translateX(-50%) translateY(0); }

  /* ---- History ---- */
  .hist-head{
    display:flex; justify-content:space-between; align-items:center;
    margin: 26px 0 10px;
  }
  .hist-head h2{
    font-family:'Fraunces', serif;
    font-size: 17px; font-weight:600; margin:0;
    color: var(--cocoa-deep);
  }
  .hist-head .export{
    font-size: 12.5px; font-weight:600; color: var(--frost-deep);
    background: var(--frost-pale); border:none; padding:7px 12px; border-radius:10px;
    cursor:pointer;
  }

  .entry{
    display:flex; align-items:center; gap:12px;
    padding: 12px 14px;
    background: white;
    border-radius: 14px;
    margin-bottom: 8px;
    border: 1px solid var(--line);
  }
  .entry .tag{
    width: 8px; height: 34px; border-radius:4px; flex-shrink:0;
  }
  .entry .tag.geladinho{ background: var(--frost); }
  .entry .tag.pudim{ background: var(--caramel-deep); }
  .entry .tag.bolo{ background: #8C5E2A; }
  .entry .info{ flex:1; min-width:0; }
  .entry .cliente{ font-weight:600; font-size:14.5px; color:var(--cocoa-deep); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .entry .meta{ font-size:12px; color: var(--cocoa); opacity:0.75; margin-top:1px; }
  .entry .amount{
    font-family:'IBM Plex Mono', monospace;
    font-weight:600; font-size:14.5px; color:var(--cocoa-deep);
    text-align:right;
  }
  .entry .pago-flag{ font-size:10.5px; font-weight:700; margin-top:2px; }
  .entry .pago-flag.sim{ color: var(--good); }
  .entry .pago-flag.nao{ color: var(--bad); }
  .entry .del{
    border:none; background:transparent; color: var(--bad); font-size:18px;
    cursor:pointer; padding:4px 2px; opacity:0.55;
  }

  .empty{
    text-align:center; padding: 28px 10px; color: var(--cocoa); opacity:0.55; font-size:14px;
  }

  .loading{
    text-align:center; padding: 40px 10px; color: var(--cocoa); opacity:0.6; font-size:14px;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand"><span class="dot">🍮</span> Bendito Pudim</div>
    <div class="subtitle">Lançar venda</div>
    <div class="goal-row">
      <div class="goal-card">
        <div class="goal-label">Meta da semana</div>
        <div class="goal-value" id="goalValue">R$ 0,00</div>
        <div class="therm"><div class="therm-fill" id="thermFill" style="width:0%"></div></div>
      </div>
      <div class="goal-card">
        <div class="goal-label">Vendido esta semana</div>
        <div class="goal-value" id="weekValue">R$ 0,00</div>
      </div>
    </div>
  </header>

  <main>
    <div class="segmented" id="segProduto">
      <button class="seg-btn active" data-p="geladinho">🧊 Geladinho</button>
      <button class="seg-btn" data-p="pudim">🍮 Pudim</button>
      <button class="seg-btn" data-p="bolo">🎂 Bolo</button>
    </div>

    <div class="card">
      <div class="field">
        <label>Vendedor</label>
        <input type="text" id="vendedor" placeholder="Seu nome">
      </div>

      <div class="field">
        <label>Cliente</label>
        <input type="text" id="cliente" placeholder="Nome do cliente">
      </div>

      <div class="field">
        <label>Sabor</label>
        <input type="text" id="sabor" placeholder="Ex.: Pudim, Morango...">
      </div>

      <div class="field" id="tamanhosWrap" style="display:none;">
        <label>Tamanho</label>
        <div class="tamanhos" id="tamanhos"></div>
      </div>

      <div class="row2">
        <div class="field">
          <label>Quantidade</label>
          <div class="stepper">
            <button type="button" id="qtdMinus">−</button>
            <input type="number" id="qtd" value="1" min="1">
            <button type="button" id="qtdPlus">+</button>
          </div>
        </div>
      </div>

      <div class="row2">
        <div class="field">
          <label>Preço cheio (unit.)</label>
          <div class="price-input">
            <span>R$</span>
            <input type="text" inputmode="decimal" id="valorCheio" value="8,00">
          </div>
        </div>
        <div class="field">
          <label>Valor com desconto (unit.)</label>
          <div class="price-input">
            <span>R$</span>
            <input type="text" inputmode="decimal" id="valorUnit" value="8,00">
          </div>
        </div>
        <div class="field">
          <label>% desconto</label>
          <div class="price-input" id="descontoBox">
            <span id="descontoValor">0%</span>
          </div>
        </div>
      </div>

      <div class="field">
        <label>Pagamento</label>
        <div class="toggle-pago" id="togglePago">
          <button type="button" data-v="sim" class="active">✓ Pago</button>
          <button type="button" data-v="nao">Fiado</button>
        </div>
      </div>

      <div class="total-strip">
        <div>
          <span class="lbl">Total da venda</span>
          <div class="breakdown" id="totalBreakdown">1 x R$ 8,00</div>
        </div>
        <span class="val" id="totalVenda">R$ 8,00</span>
      </div>

      <button class="submit-btn" id="btnSalvar">Registrar venda</button>
    </div>

    <div class="hist-head">
      <h2>Hoje</h2>
      <button class="export" id="btnExport">Exportar CSV</button>
    </div>
    <div id="listaHoje"><div class="loading">Carregando...</div></div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
import { initializeFirestore, collection, doc, setDoc, deleteDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAa-u8Llhxcs63e1BGPC-sHN9LEEakTqLo",
  authDomain: "bendito-pudim-77df5.firebaseapp.com",
  projectId: "bendito-pudim-77df5",
  storageBucket: "bendito-pudim-77df5.firebasestorage.app",
  messagingSenderId: "723554743037",
  appId: "1:723554743037:web:3aedf77e68c7cc8bdac494"
};

const app = initializeApp(firebaseConfig);
// O "default" abaixo é o NOME do banco de dados criado no Firestore
const db = initializeFirestore(app, { experimentalAutoDetectLongPolling: true }, "default");

window.fb = {
  escutarVendas: (cb, errCb) => onSnapshot(query(collection(db, 'vendas'), orderBy('ts', 'desc')), cb, errCb),
  salvarVenda: (venda) => setDoc(doc(db, 'vendas', venda.id), venda),
  excluirVenda: (id) => deleteDoc(doc(db, 'vendas', id)),
  escutarMeta: (cb) => onSnapshot(doc(db, 'config', 'meta'), cb),
  salvarMeta: (valor) => setDoc(doc(db, 'config', 'meta'), { semanal: valor })
};
window.dispatchEvent(new Event('fb-pronto'));
</script>

<script>
const PRECOS_PADRAO = { geladinho: 8.00, pudim: 15.00, bolo: 55.00 };
const TAMANHOS_PUDIM = [15, 25, 35, 50, 60];
let metaSemanal = 478.80;
const PIN_ADMIN = '152992'; // Troque por um PIN só seu antes de publicar!

let produtoAtual = 'geladinho';
let pagoAtual = 'sim';
let vendas = [];

const $ = (id) => document.getElementById(id);

function parseValor(str){
  const n = parseFloat(String(str).replace(/\./g,'').replace(',', '.'));
  return isNaN(n) ? 0 : n;
}
function fmtRS(n){
  return 'R$ ' + n.toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2});
}
function fmtValorInput(n){
  return n.toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2});
}

function showToast(msg){
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=> t.classList.remove('show'), 2200);
}

function recalcDesconto(){
  const cheio = parseValor($('valorCheio').value);
  const comDesc = parseValor($('valorUnit').value);
  const pctEl = $('descontoValor');
  if(cheio <= 0){
    pctEl.textContent = '0%';
    pctEl.classList.remove('tem-desconto');
    return;
  }
  const pct = ((cheio - comDesc) / cheio) * 100;
  const pctArredondado = Math.round(pct * 10) / 10;
  pctEl.textContent = pctArredondado + '%';
  pctEl.classList.toggle('tem-desconto', pctArredondado > 0);
}

function recalcTotal(){
  const qtd = parseInt($('qtd').value) || 0;
  const unit = parseValor($('valorUnit').value);
  $('totalVenda').textContent = fmtRS(qtd * unit);
  $('totalBreakdown').textContent = qtd + ' x ' + fmtRS(unit);
  recalcDesconto();
}

function renderTamanhos(){
  const wrap = $('tamanhosWrap');
  const cont = $('tamanhos');
  if(produtoAtual !== 'pudim'){
    wrap.style.display = 'none';
    return;
  }
  wrap.style.display = 'block';
  cont.innerHTML = TAMANHOS_PUDIM.map(v => `
    <button type="button" class="tamanho-chip" data-v="${v}">R$ ${v}</button>
  `).join('');
  cont.querySelectorAll('.tamanho-chip').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      cont.querySelectorAll('.tamanho-chip').forEach(b=> b.classList.remove('active'));
      btn.classList.add('active');
      const v = parseFloat(btn.dataset.v);
      $('valorCheio').value = fmtValorInput(v);
      $('valorUnit').value = fmtValorInput(v);
      recalcTotal();
    });
  });
}

function selectProduto(p){
  produtoAtual = p;
  document.querySelectorAll('#segProduto .seg-btn').forEach(b=>{
    b.classList.toggle('active', b.dataset.p === p);
  });
  $('valorCheio').value = fmtValorInput(PRECOS_PADRAO[p]);
  $('valorUnit').value = fmtValorInput(PRECOS_PADRAO[p]);
  if(!$('sabor').value) $('sabor').value = p === 'bolo' ? 'Bolo de pudim' : 'Pudim';
  renderTamanhos();
  recalcTotal();
}

function selectPago(v){
  pagoAtual = v;
  document.querySelectorAll('#togglePago button').forEach(b=>{
    b.classList.toggle('active', b.dataset.v === v);
  });
}

$('segProduto').addEventListener('click', (e)=>{
  const btn = e.target.closest('.seg-btn');
  if(btn) selectProduto(btn.dataset.p);
});
$('togglePago').addEventListener('click', (e)=>{
  const btn = e.target.closest('button');
  if(btn) selectPago(btn.dataset.v);
});
$('qtdMinus').addEventListener('click', ()=>{
  $('qtd').value = Math.max(1, (parseInt($('qtd').value)||1) - 1);
  recalcTotal();
});
$('qtdPlus').addEventListener('click', ()=>{
  $('qtd').value = (parseInt($('qtd').value)||1) + 1;
  recalcTotal();
});
$('qtd').addEventListener('input', recalcTotal);
$('valorUnit').addEventListener('input', recalcTotal);
$('valorCheio').addEventListener('input', recalcDesconto);

function startOfWeek(d){
  const date = new Date(d);
  const day = date.getDay();
  const diff = day;
  date.setHours(0,0,0,0);
  date.setDate(date.getDate() - diff);
  return date;
}

function renderGoal(){
  const now = new Date();
  const wkStart = startOfWeek(now).getTime();
  const totalSemana = vendas
    .filter(v => v.ts >= wkStart)
    .reduce((s,v)=> s + v.total, 0);
  $('weekValue').textContent = fmtRS(totalSemana);
  $('goalValue').textContent = fmtRS(metaSemanal);
  const pct = metaSemanal > 0 ? Math.min(100, (totalSemana / metaSemanal) * 100) : 0;
  $('thermFill').style.width = pct + '%';
}

function renderHoje(){
  const now = new Date();
  const todayStart = new Date(now); todayStart.setHours(0,0,0,0);
  const todays = vendas.filter(v => v.ts >= todayStart.getTime()).sort((a,b)=> b.ts - a.ts);
  const cont = $('listaHoje');
  if(todays.length === 0){
    cont.innerHTML = '<div class="empty">Nenhuma venda registrada hoje ainda.</div>';
    return;
  }
  cont.innerHTML = todays.map(v => `
    <div class="entry" data-id="${v.id}">
      <div class="tag ${v.produto}"></div>
      <div class="info">
        <div class="cliente">${escapeHtml(v.cliente || 'Sem nome')}</div>
        <div class="meta">${v.qtd}x ${escapeHtml(v.sabor||'')} · ${nomeProduto(v.produto)}${v.pctDesconto ? ' · -' + v.pctDesconto + '%' : ''} · ${escapeHtml(v.vendedor||'—')}</div>
      </div>
      <div>
        <div class="amount">${fmtRS(v.total)}</div>
        <div class="pago-flag ${v.pago==='sim'?'sim':'nao'}">${v.pago==='sim' ? 'PAGO' : 'FIADO'}</div>
      </div>
      <button class="del" data-id="${v.id}" title="Remover">✕</button>
    </div>
  `).join('');

  cont.querySelectorAll('.del').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      const id = btn.dataset.id;
      await excluirVenda(id);
    });
  });
}

function nomeProduto(p){
  if(p === 'geladinho') return 'Geladinho';
  if(p === 'bolo') return 'Bolo de pudim';
  return 'Pudim';
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

function carregarVendas(){
  // Escuta em tempo real: qualquer venda registrada por você ou pelo vendedor
  // atualiza a tela na hora, nos dois aparelhos.
  window.fb.escutarVendas((snapshot)=>{
    vendas = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
    renderHoje();
    renderGoal();
  }, (err)=>{
    console.error(err);
    showToast('Erro ao conectar com o banco de dados');
  });

  // Escuta a meta semanal definida pela administradora
  window.fb.escutarMeta((docSnap)=>{
    if(docSnap.exists() && docSnap.data().semanal > 0){
      metaSemanal = docSnap.data().semanal;
      renderGoal();
    }
  });
}

async function carregarNomeVendedor(){
  try{
    const nome = localStorage.getItem('bp_nome_vendedor');
    if(nome) $('vendedor').value = nome;
  }catch(e){ }
}

async function salvarNomeVendedor(nome){
  try{
    localStorage.setItem('bp_nome_vendedor', nome);
  }catch(e){ }
}

async function salvarVenda(venda){
  const timeout = new Promise((_, reject) => setTimeout(() => reject(new Error('timeout')), 8000));
  await Promise.race([window.fb.salvarVenda(venda), timeout]);
}

async function excluirVenda(id){
  try{
    await window.fb.excluirVenda(id);
  }catch(e){
    console.error('Erro ao excluir venda:', e);
    showToast('Não consegui excluir. Tente novamente.');
  }
}

$('btnSalvar').addEventListener('click', async ()=>{
  const vendedor = $('vendedor').value.trim();
  const cliente = $('cliente').value.trim();
  const sabor = $('sabor').value.trim();
  const qtd = parseInt($('qtd').value) || 1;
  const cheio = parseValor($('valorCheio').value);
  const unit = parseValor($('valorUnit').value);
  const total = qtd * unit;
  const pctDesconto = cheio > 0 ? Math.round(((cheio - unit) / cheio) * 1000) / 10 : 0;

  if(!vendedor){
    showToast('Digite seu nome');
    $('vendedor').focus();
    return;
  }
  if(!cliente){
    showToast('Digite o nome do cliente');
    $('cliente').focus();
    return;
  }

  const btn = $('btnSalvar');
  btn.disabled = true;
  btn.textContent = 'Salvando...';

  const nova = {
    id: Date.now().toString(36) + Math.random().toString(36).slice(2,7),
    ts: Date.now(),
    vendedor, cliente, sabor, produto: produtoAtual,
    qtd, valorCheio: cheio, valorUnit: unit, pctDesconto, total,
    pago: pagoAtual
  };

  try {
    await salvarVenda(nova);
    salvarNomeVendedor(vendedor);
    showToast('Venda registrada ✓');
    $('cliente').value = '';
    $('qtd').value = 1;
    recalcTotal();
  } catch(e) {
    console.error('Erro ao salvar venda:', e);
    showToast('Não consegui salvar. Verifique a internet.');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Registrar venda';
  }
});

$('btnExport').addEventListener('click', ()=>{
  if(vendas.length === 0){ showToast('Nenhuma venda pra exportar'); return; }
  const header = 'Data,Vendedor,Cliente,Produto,Sabor,Qtd,Preço cheio (R$),Valor unit (R$),% Desconto,Valor total (R$),Pago\n';
  const rows = vendas
    .slice()
    .sort((a,b)=> a.ts - b.ts)
    .map(v => {
      const d = new Date(v.ts);
      const data = d.toLocaleDateString('pt-BR');
      return [data, v.vendedor||'', v.cliente, nomeProduto(v.produto), v.sabor, v.qtd, (v.valorCheio||v.valorUnit).toFixed(2), v.valorUnit.toFixed(2), v.pctDesconto||0, v.total.toFixed(2), v.pago==='sim'?'Sim':'Não'].join(',');
    }).join('\n');
  const blob = new Blob([header + rows], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'vendas_bendito_pudim.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
});

// Área da administradora: toque no valor da meta (no topo) para alterá-la com o PIN
$('goalValue').addEventListener('click', async ()=>{
  const pin = prompt('PIN de administrador:');
  if(pin === null) return;
  if(pin !== PIN_ADMIN){ showToast('PIN incorreto'); return; }
  const atual = metaSemanal.toFixed(2).replace('.', ',');
  const novo = prompt('Nova meta semanal (R$):', atual);
  if(novo === null) return;
  const v = parseValor(novo);
  if(v > 0){
    try{
      await window.fb.salvarMeta(v);
      showToast('Meta atualizada ✓');
    }catch(e){
      console.error(e);
      showToast('Erro ao salvar a meta');
    }
  }
});

selectProduto('geladinho');
carregarNomeVendedor();
window.addEventListener('fb-pronto', ()=>{ carregarVendas(); });
</script>
</body>
</html>
