<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Bendito Pudim — Lançar Venda</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Work+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap');

  :root{
    --cream:#FBF3E7;
    --cream-2:#F3E7D3;
    --cocoa:#5A3A22;
    --cocoa-deep:#3E2814;
    --caramel:#C8893F;
    --caramel-deep:#7B4B2A;
    --frost:#4F8B99;
    --frost-deep:#2E5A66;
    --frost-pale:#E4F1F3;
    --caramel-pale:#F7E9D2;
    --good:#4C7A52;
    --good-bg:#E4EEE1;
    --bad:#B5482F;
    --bad-bg:#F7E3DD;
    --line: rgba(90,58,34,0.14);
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background: var(--cream);
    font-family:'Work Sans', sans-serif;
    color: var(--cocoa-deep);
    min-height:100vh;
    -webkit-tap-highlight-color: transparent;
  }
  .wrap{
    max-width: 480px;
    margin: 0 auto;
    padding: 0 0 48px;
    min-height:100vh;
    background: var(--cream);
  }

  /* ---- Header / thermometer signature ---- */
  header{
    background: linear-gradient(180deg, var(--cocoa-deep), var(--cocoa) 85%);
    color: var(--cream);
    padding: 22px 20px 26px;
    border-radius: 0 0 28px 28px;
    position: relative;
    overflow: hidden;
  }
  header::after{
    content:"";
    position:absolute; right:-40px; top:-40px;
    width:140px; height:140px; border-radius:50%;
    background: radial-gradient(circle, rgba(200,137,63,0.35), transparent 70%);
  }
  .brand{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size: 22px;
    letter-spacing: 0.2px;
    display:flex; align-items:center; gap:8px;
  }
  .brand .dot{ font-size:20px; }
  .subtitle{
    font-size: 12.5px;
    opacity: 0.72;
    margin-top: 2px;
    font-weight:500;
  }

  .goal-row{
    margin-top: 18px;
    display:flex;
    gap: 10px;
  }
  .goal-card{
    flex:1;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: 14px;
    padding: 10px 12px;
  }
  .goal-label{
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    opacity: 0.65;
    font-weight:600;
  }
  .goal-value{
    font-family:'IBM Plex Mono', monospace;
    font-size: 15px;
    font-weight:600;
    margin-top:3px;
  }
  .therm{
    margin-top: 8px;
    height: 7px;
    border-radius: 6px;
    background: rgba(255,255,255,0.15);
    overflow:hidden;
  }
  .therm-fill{
    height:100%;
    background: linear-gradient(90deg, var(--caramel), #E8B36B);
    border-radius: 6px;
    transition: width 0.5s ease;
  }

  /* ---- Body ---- */
  main{ padding: 20px 20px 0; }

  .segmented{
    display:flex;
    background: var(--cream-2);
    border-radius: 14px;
    padding: 4px;
    gap: 4px;
  }
  .seg-btn{
    flex:1;
    border:none;
    background:transparent;
    padding: 12px 8px;
    border-radius: 10px;
    font-family:'Work Sans', sans-serif;
    font-weight:600;
    font-size: 14.5px;
    color: var(--cocoa);
    cursor:pointer;
    transition: all 0.18s ease;
  }
  .seg-btn.active[data-p="geladinho"]{
    background: var(--frost);
    color: white;
    box-shadow: 0 3px 10px rgba(79,139,153,0.35);
  }
  .seg-btn.active[data-p="pudim"]{
    background: var(--caramel-deep);
    color: white;
    box-shadow: 0 3px 10px rgba(123,75,42,0.35);
  }
  .seg-btn.active[data-p="bolo"]{
    background: #8C5E2A;
    color: white;
    box-shadow: 0 3px 10px rgba(140,94,42,0.35);
  }

  .tamanhos{
    display:flex; flex-wrap:wrap; gap:8px;
  }
  .tamanho-chip{
    border: 1.5px solid var(--line);
    background: var(--cream);
    border-radius: 10px;
    padding: 9px 14px;
    font-family:'IBM Plex Mono', monospace;
    font-weight:600;
    font-size: 14px;
    color: var(--cocoa);
    cursor:pointer;
  }
  .tamanho-chip.active{
    background: var(--caramel-deep);
    border-color: var(--caramel-deep);
    color: white;
  }

  .card{
    background: white;
    border-radius: 18px;
    padding: 18px;
    margin-top: 16px;
    border: 1px solid var(--line);
  }

  .field{ margin-bottom: 16px; }
  .field label{
    display:block;
    font-size: 12px;
    font-weight:600;
    color: var(--cocoa);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-bottom: 6px;
  }
  .field input[type="text"]{
    width:100%;
    border: 1.5px solid var(--line);
    background: var(--cream);
    border-radius: 12px;
    padding: 12px 14px;
    font-size: 16px;
    font-family:'Work Sans', sans-serif;
    color: var(--cocoa-deep);
  }
  .field input[type="text"]:focus{
    outline: none;
    border-color: var(--caramel);
  }

  .row2{ display:flex; gap:12px; }
  .row2 .field{ flex:1; }

  .stepper{
    display:flex;
    align-items:center;
    border: 1.5px solid var(--line);
    background: var(--cream);
    border-radius: 12px;
    overflow:hidden;
  }
  .stepper button{
    width: 44px; height: 46px;
    border:none;
    background: var(--cream-2);
    font-size: 20px;
    font-weight:700;
    color: var(--cocoa-deep);
    cursor:pointer;
  }
  .stepper input{
    flex:1;
    border:none;
    background:transparent;
    text-align:center;
    font-family:'IBM Plex Mono', monospace;
    font-size: 17px;
    font-weight:600;
    color: var(--cocoa-deep);
    -moz-appearance: textfield;
  }
  .stepper input::-webkit-outer-spin-button,
  .stepper input::-webkit-inner-spin-button{ -webkit-appearance:none; margin:0; }

  .price-input{
    display:flex; align-items:center;
    border: 1.5px solid var(--line);
    background: var(--cream);
    border-radius: 12px;
    padding: 0 12px;
  }
  .price-input span{ font-family:'IBM Plex Mono', monospace; font-weight:600; color:var(--cocoa); font-size:15px;}
  .price-input input{
    border:none; background:transparent; padding: 12px 6px;
    font-family:'IBM Plex Mono', monospace; font-size:16px; font-weight:600;
    color: var(--cocoa-deep); width:100%;
  }
  .price-input input:focus{ outline:none; }
  #descontoBox{
    justify-content:center;
    background: var(--cream-2);
  }
  #descontoValor{
    font-size: 16px;
    font-weight:700;
  }
  #descontoValor.tem-desconto{ color: var(--good); }

  .toggle-pago{
    display:flex; gap:8px;
  }
  .toggle-pago button{
    flex:1;
    border: 1.5px solid var(--line);
    background: var(--cream);
    border-radius: 12px;
    padding: 11px;
    font-weight:600;
    font-size: 14px;
    color: var(--cocoa);
    cursor:pointer;
  }
  .toggle-pago button.active[data-v="sim"]{
    background: var(--good-bg); border-color: var(--good); color: var(--good);
  }
  .toggle-pago button.active[data-v="nao"]{
    background: var(--bad-bg); border-color: var(--bad); color: var(--bad);
  }

  .total-strip{
    display:flex; justify-content:space-between; align-items:baseline;
    padding: 14px 4px 4px;
    border-top: 1px dashed var(--line);
    margin-top: 4px;
  }
  .total-strip .lbl{ font-size:13px; font-weight:600; color:var(--cocoa); }
  .breakdown{
    font-family:'IBM Plex Mono', monospace;
    font-size: 13px;
    color: var(--cocoa);
    opacity: 0.7;
    margin-top: 2px;
  }
  .total-strip .val{
    font-family:'Fraunces', serif;
    font-size: 26px;
    font-weight:600;
    color: var(--cocoa-deep);
  }

  .submit-btn{
    width:100%;
    margin-top: 16px;
    border:none;
    background: var(--caramel-deep);
    color: white;
    padding: 16px;
    border-radius: 14px;
    font-family:'Work Sans', sans-serif;
    font-size: 16px;
    font-weight:700;
    letter-spacing: 0.02em;
    cursor:pointer;
    transition: transform 0.12s ease;
  }
  .submit-btn:active{ transform: scale(0.98); }
  .submit-btn:disabled{ opacity:0.5; }

  .toast{
    position: fixed;
    bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--cocoa-deep);
    color: var(--cream);
    padding: 12px 20px;
    border-radius: 12px;
    font-size: 14px;
    font-weight:600;
    opacity:0;
    pointer-events:none;
    transition: all 0.25s ease;
    z-index: 50;
    white-space:nowrap;
  }
  .toast.show{ opacity:1; transform: translateX(-50%) translateY(0); }

  /* ---- History ---- */
  .hist-head{
    display:flex; justify-content:space-between; align-items:center;
    margin: 26px 0 10px;
  }
  .hist-head h2{
    font-family:'Fraunces', serif;
    font-size: 17px; font-weight:600; margin:0;
    color: var(--cocoa-deep);
  }
  .hist-head .export{
    font-size: 12.5px; font-weight:600; color: var(--frost-deep);
    background: var(--frost-pale); border:none; padding:7px 12px; border-radius:10px;
    cursor:pointer;
  }

  .entry{
    display:flex; align-items:center; gap:12px;
    padding: 12px 14px;
    background: white;
    border-radius: 14px;
    margin-bottom: 8px;
    border: 1px solid var(--line);
  }
  .entry .tag{
    width: 8px; height: 34px; border-radius:4px; flex-shrink:0;
  }
  .entry .tag.geladinho{ background: var(--frost); }
  .entry .tag.pudim{ background: var(--caramel-deep); }
  .entry .tag.bolo{ background: #8C5E2A; }
  .entry .info{ flex:1; min-width:0; }
  .entry .cliente{ font-weight:600; font-size:14.5px; color:var(--cocoa-deep); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .entry .meta{ font-size:12px; color: var(--cocoa); opacity:0.75; margin-top:1px; }
  .entry .amount{
    font-family:'IBM Plex Mono', monospace;
    font-weight:600; font-size:14.5px; color:var(--cocoa-deep);
    text-align:right;
  }
  .entry .pago-flag{ font-size:10.5px; font-weight:700; margin-top:2px; }
  .entry .pago-flag.sim{ color: var(--good); }
  .entry .pago-flag.nao{ color: var(--bad); }
  .entry .del{
    border:none; background:transparent; color: var(--bad); font-size:18px;
    cursor:pointer; padding:4px 2px; opacity:0.55;
  }
